name: CI

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BACKEND_IMAGE: adnanh7/fx-prime-backend
  FRONTEND_IMAGE: adnanh7/fx-prime-frontend

permissions:
  contents: read

concurrency:
  group: ci-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.9"
      - name: Install and build types
        run: bun install --cwd packages/types && bun run --cwd packages/types build
      - name: Install backend
        run: bun install --cwd .
      - name: Typecheck backend
        run: bun run build
      - name: API tests
        run: bun test tests/
        env:
          JWT_SECRET: test-jwt-secret-minimum-32-characters-long
          JWT_REFRESH_SECRET: test-refresh-secret-minimum-32-chars
          FRONTEND_URL: http://localhost:3000

  docker_backend:
    needs: [backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and optionally push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:main
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy_ssh:
    needs: [docker_backend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-vps-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v6
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          touch ~/.ssh/known_hosts
          for i in 1 2 3 4 5; do
            ssh-keyscan -T 10 -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null && break
            echo "ssh-keyscan attempt $i failed, retrying..."
            sleep 3
          done
      - name: Copy deploy assets to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'mkdir -p /var/www/fxprime/deploy /var/www/fxprime/uploads'
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            deploy/docker-compose.yml \
            deploy/docker-deploy.sh \
            deploy/backend.env.example \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/fxprime/deploy/"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=accept-new \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'chmod +x /var/www/fxprime/deploy/docker-deploy.sh'
      - name: Deploy Docker stack on VPS
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=accept-new \
            -o ConnectTimeout=30 \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            "DOCKERHUB_USERNAME='${{ secrets.DOCKERHUB_USERNAME }}' DOCKERHUB_TOKEN='${DOCKERHUB_TOKEN}' BACKEND_IMAGE='${BACKEND_IMAGE}:main' FRONTEND_IMAGE='${FRONTEND_IMAGE}:main' bash /var/www/fxprime/deploy/docker-deploy.sh backend"
